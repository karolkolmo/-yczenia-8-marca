<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1600" viewBox="0 0 1080 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7fb"/>
      <stop offset="0.55" stop-color="#fff0d9"/>
      <stop offset="1" stop-color="#f7d8e4"/>
    </linearGradient>
    <radialGradient id="petal" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#fff7fb"/>
      <stop offset="1" stop-color="#d21f5b"/>
    </radialGradient>
    <linearGradient id="car" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b4c"/>
      <stop offset="0.45" stop-color="#174aa8"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#6b243f" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 72px Georgia, serif; fill: #8f123f; text-anchor: middle; }
      .line { font: 500 48px Georgia, serif; fill: #542435; text-anchor: middle; }
      .small { font: 500 38px Georgia, serif; fill: #6d3140; text-anchor: middle; }
      .gold { fill: #c69a2f; }
      .stem { stroke: #2f7b45; stroke-width: 9; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <rect width="1080" height="1600" fill="url(#bg)"/>
  <rect x="58" y="58" width="964" height="1484" rx="44" fill="none" stroke="#d7a646" stroke-width="12"/>
  <rect x="88" y="88" width="904" height="1424" rx="34" fill="none" stroke="#fff2b8" stroke-width="4"/>

  <g opacity="0.92">
    <path class="stem" d="M120 275 C70 430 90 560 145 700"/>
    <path class="stem" d="M955 260 C1010 430 990 590 925 720"/>
    <path class="stem" d="M118 1325 C75 1185 92 1050 162 925"/>
    <path class="stem" d="M960 1330 C1010 1180 985 1045 910 920"/>
  </g>

  <g id="flower">
    <circle r="30" fill="url(#petal)"/>
    <circle cx="36" cy="0" r="30" fill="#f45b89"/>
    <circle cx="18" cy="31" r="30" fill="#e22e66"/>
    <circle cx="-18" cy="31" r="30" fill="#f06c9a"/>
    <circle cx="-36" cy="0" r="30" fill="#d21f5b"/>
    <circle cx="-18" cy="-31" r="30" fill="#f7a1bc"/>
    <circle cx="18" cy="-31" r="30" fill="#ec477c"/>
    <circle r="16" fill="#ffd35b"/>
  </g>
  <g id="whiteflower">
    <circle cx="0" cy="-33" r="28" fill="#fff"/>
    <circle cx="31" cy="-10" r="28" fill="#fff6f8"/>
    <circle cx="20" cy="28" r="28" fill="#fff"/>
    <circle cx="-20" cy="28" r="28" fill="#fff6f8"/>
    <circle cx="-31" cy="-10" r="28" fill="#fff"/>
    <circle r="14" fill="#e0a92f"/>
  </g>

  <g filter="url(#shadow)">
    <use href="#flower" x="135" y="170"/>
    <use href="#whiteflower" x="240" y="145"/>
    <use href="#flower" x="890" y="165"/>
    <use href="#whiteflower" x="795" y="145"/>
    <use href="#flower" x="120" y="490" transform="scale(.85)"/>
    <use href="#whiteflower" x="960" y="500" transform="scale(.85)"/>
    <use href="#flower" x="150" y="1240"/>
    <use href="#whiteflower" x="250" y="1380"/>
    <use href="#flower" x="905" y="1245"/>
    <use href="#whiteflower" x="815" y="1385"/>
  </g>

  <text x="540" y="255" class="title">Serdeczne Życzenia</text>
  <text x="540" y="335" class="title">urodzinowe</text>
  <text x="540" y="455" class="line">dla mojej Cesarzowej</text>
  <text x="540" y="525" class="line">Małgorzaty</text>
  <text x="540" y="630" class="small">od swojego Wielbiciela</text>
  <text x="540" y="688" class="small">Karmicznego Antoniego</text>

  <g transform="translate(155 850)" filter="url(#shadow)">
    <ellipse cx="385" cy="330" rx="360" ry="58" fill="#6b243f" opacity="0.16"/>
    <path d="M90 255 C155 155 245 105 370 105 L530 105 C625 112 690 170 730 250 C760 260 785 282 795 315 L745 326 C726 285 690 270 650 270 L188 270 C145 270 116 288 98 325 L45 315 C52 285 65 266 90 255 Z" fill="url(#car)"/>
    <path d="M232 132 L374 132 C425 132 477 139 526 157 C478 170 408 174 320 171 C285 170 252 157 232 132 Z" fill="#b9dcff" opacity="0.88"/>
    <path d="M515 160 C585 178 635 209 668 252 L540 246 C508 214 500 184 515 160 Z" fill="#8fc4ff" opacity="0.82"/>
    <path d="M97 252 C135 270 188 279 255 278 L677 278 C730 278 766 269 792 255 L800 304 C755 332 690 345 604 343 L227 343 C142 343 80 329 40 304 Z" fill="#071126"/>
    <path d="M130 258 C170 238 210 229 250 229 L668 229 C708 229 744 240 775 262" fill="none" stroke="#2c74d6" stroke-width="16" stroke-linecap="round" opacity="0.85"/>
    <circle cx="205" cy="330" r="78" fill="#080a10"/>
    <circle cx="205" cy="330" r="46" fill="#d8e2ef"/>
    <circle cx="205" cy="330" r="20" fill="#23364f"/>
    <circle cx="645" cy="330" r="78" fill="#080a10"/>
    <circle cx="645" cy="330" r="46" fill="#d8e2ef"/>
    <circle cx="645" cy="330" r="20" fill="#23364f"/>
    <path d="M108 248 C130 202 185 180 252 178" fill="none" stroke="#f7fbff" stroke-width="8" opacity="0.55"/>
    <path d="M700 270 C742 268 766 277 785 296" fill="none" stroke="#fff0b5" stroke-width="14" stroke-linecap="round"/>
    <path d="M80 290 C115 298 146 299 175 292" fill="none" stroke="#fff0b5" stroke-width="12" stroke-linecap="round"/>
    <text x="420" y="420" font-family="Georgia, serif" font-size="34" fill="#6d3140" text-anchor="middle">Bugatti Chiron</text>
  </g>

  <g opacity="0.9">
    <circle cx="540" cy="775" r="7" class="gold"/>
    <circle cx="500" cy="775" r="5" class="gold"/>
    <circle cx="580" cy="775" r="5" class="gold"/>
  </g>
</svg>
